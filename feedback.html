<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ver Resultados</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📋 Consulta de Resultados</h1>
    <div class="form-group" style="max-width:300px; margin:auto;">
      <label>Ingrese su DNI</label>
      <input type="text" id="dni" placeholder="Ej: 12345678" pattern="[0-9]{7,8}">
      <button class="btn btn-primary" onclick="fetchResult()" style="width:100%; margin-top:0.5rem">🔍 Buscar</button>
    </div>
    <div id="result" style="margin-top:2rem;"></div>
    <a href="index.html" class="btn btn-secondary" style="display:block; text-align:center; margin-top:2rem;">← Volver</a>
  </div>
  <script src="main.js"></script>
  <script>
    async function fetchResult() {
      const dni = document.getElementById('dni').value.trim();
      if (!/^\d{7,8}$/.test(dni)) return alert('Ingrese un DNI válido (7 u 8 dígitos)');
      const url = localStorage.getItem('gasUrl');
      if (!url || !url.startsWith('http')) return alert('La URL del Apps Script no está configurada. Contacte al profesor.');
      
      document.getElementById('result').innerHTML = '<p>⏳ Buscando...</p>';
      try {
        const res = await fetch(`${url}?action=getByDni&dni=${dni}`);
        const data = await res.json();
        if (data.found) {
          const q = JSON.parse(localStorage.getItem('examQuestions') || '[]');
          let html = `<div class="res-card"><h2>Nota: ${data.data.finalScore10} / 10</h2><p>${data.data.student.apellido}, ${data.data.student.nombre} | ${new Date(data.data.timestamp).toLocaleString()}</p></div>`;
          data.data.details.forEach(d => {
            const pq = q.find(x => x.questionIndex === d.q) || {};
            const isOk = d.userAnswer.join(',') === d.correct.join(',');
            html += `<div class="fb-q ${isOk?'correct':'incorrect'}">
              <h4>Pregunta ${d.q+1} ${isOk?'✅':'❌'} (${d.score} pts)</h4>
              <p>${pq.text || 'Pregunta no disponible'}</p>
              <p><strong>Tu respuesta:</strong> ${(d.userAnswer||[]).map(i => pq.options[i]||'?').join(', ') || 'Sin responder'}</p>
              ${!isOk ? `<p><strong>Correcta:</strong> ${d.correct.map(i => pq.options[i]).join(', ')}</p>` : ''}
            </div>`;
          });
          document.getElementById('result').innerHTML = html;
        } else {
          document.getElementById('result').innerHTML = `<p class="error-msg">❌ No se encontraron resultados para DNI ${dni}</p>`;
        }
      } catch(e) {
        document.getElementById('result').innerHTML = `<p class="error-msg">Error de conexión. Intente más tarde.</p>`;
      }
    }
  </script>
</body>
</html>
