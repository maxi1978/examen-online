<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultados del Examen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container feedback-container">
    <h1>📋 Mis Resultados</h1>
    <div id="studentInfo"></div>
    <div id="feedbackContent"></div>
    <a href="index.html" class="btn btn-secondary" style="margin-top:1rem;">← Volver al inicio</a>
  </div>

  <script src="main.js"></script>
  <script>
    const student = JSON.parse(localStorage.getItem('examStudent'));
    if (!student) { window.location.href = 'index.html'; }

    document.getElementById('studentInfo').textContent = `${student.apellido}, ${student.nombre} (DNI: ${student.dni})`;

    const feedbackEnabled = localStorage.getItem('feedbackEnabled');
    if (feedbackEnabled !== 'true') {
      document.getElementById('feedbackContent').innerHTML = `
        <div class="result-card">
          <p>🔒 El profesor aún no habilitó la visualización de resultados. Intente más tarde.</p>
        </div>
      `;
    } else {
      const resultKey = `examResult_${student.dni}`;
      const examData = localStorage.getItem(resultKey);

      if (!examData) {
        document.getElementById('feedbackContent').innerHTML = `
          <div class="result-card">
            <p>No se encontraron resultados para su DNI. Asegúrese de haber completado el examen.</p>
          </div>
        `;
      } else {
        const data = JSON.parse(examData);
        const pct = ((data.totalScore / data.maxScore) * 100).toFixed(1);

        let html = `
          <div class="result-card">
            <h2>Puntaje: ${data.totalScore} / ${data.maxScore} (${pct}%)</h2>
            <p>Fecha del examen: ${new Date(data.timestamp).toLocaleString()}</p>
          </div>
        `;

        const questions = JSON.parse(localStorage.getItem('examQuestions') || '[]');
        data.results.forEach((r, i) => {
          const q = questions[i] || {};
          const isCorrect = r.score >= r.maxScore;

          html += `
            <div class="feedback-question ${isCorrect ? 'correct' : 'incorrect'}">
              <h4>Pregunta ${i + 1} ${isCorrect ? '✅' : '❌'} (${r.score} / ${r.maxScore} pts)</h4>
              <p>${q.text || 'Pregunta no disponible'}</p>
              <p><strong>Tu respuesta:</strong> ${formatAnswer(r.userAnswer, q.options)}</p>
              ${!isCorrect ? `<p><strong>Respuesta correcta:</strong> ${formatAnswer(r.correct, q.options)}</p>` : ''}
            </div>
          `;
        });

        document.getElementById('feedbackContent').innerHTML = html;
      }
    }

    function formatAnswer(indices, options) {
      if (!indices || indices.length === 0) return '<em>Sin responder</em>';
      return indices.map(i => options[i] || `Opción ${i + 1}`).join(', ');
    }
  </script>
</body>
</html>
