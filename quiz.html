<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Examen Online</title>
  <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false" ondragstart="return false" onselectstart="return false">
  <div class="container">
    <div class="header">
      <div id="studentInfo"></div>
      <div class="timer" id="timer">⏱️ --:--</div>
      <div id="qCounter"></div>
    </div>
    <div id="quizContent"></div>
    <div class="footer">
      <button class="btn btn-secondary" onclick="prev()" id="btnPrev">← Anterior</button>
      <button class="btn btn-primary" onclick="next()" id="btnNext">Siguiente →</button>
      <button class="btn btn-success" onclick="submit()" id="btnSubmit" style="display:none">📤 Finalizar</button>
    </div>
  </div>

  <div id="timeModal" class="modal" style="display:none"><div class="modal-content"><h2>⏰ Tiempo agotado</h2><p>Se enviarán automáticamente las respuestas guardadas.</p><button class="btn btn-primary" onclick="submit()">Aceptar</button></div></div>

  <script src="main.js"></script>
  <script src="quiz.js"></script>
</body>
</html>
